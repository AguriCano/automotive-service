<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Automotive Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #0f3460;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 8px;
        }
        .btn:hover { background: #1a1a2e; }
        .btn:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
        .loading {
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #e0e0e0;
            border-top-color: #0f3460;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .credits {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        .credits strong { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Automotive Service</h1>
        <p class="subtitle">Ingresa tus credenciales para obtener tu token de autorización</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" value="admin@automotive.com" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" value="admin123" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:8px;color:#666;">Obteniendo token...</p>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                const baseUrl = window.location.origin;
                const res = await fetch(baseUrl + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error al iniciar sesión');
                }

                // Abrir ventana nueva con el token
                const tokenWindow = window.open('', '_blank', 'width=600,height=400,scrollbars=yes,resizable=yes');
                tokenWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Token JWT - Automotive Service</title>
                        <meta charset="UTF-8">
                        <style>
                            * { margin: 0; padding: 0; box-sizing: border-box; }
                            body {
                                font-family: 'Courier New', monospace;
                                background: #1a1a2e;
                                color: #00ff88;
                                padding: 30px;
                                display: flex;
                                flex-direction: column;
                                align-items: center;
                                justify-content: center;
                                min-height: 100vh;
                            }
                            .card {
                                background: #16213e;
                                border: 2px solid #00ff88;
                                border-radius: 16px;
                                padding: 30px;
                                max-width: 560px;
                                width: 100%;
                                box-shadow: 0 0 40px rgba(0,255,136,0.15);
                            }
                            h2 {
                                color: #00ff88;
                                font-size: 20px;
                                margin-bottom: 20px;
                                text-align: center;
                                font-family: 'Segoe UI', sans-serif;
                            }
                            .token-box {
                                background: #0d1b2a;
                                border: 1px solid #00ff88;
                                border-radius: 10px;
                                padding: 18px;
                                word-break: break-all;
                                font-size: 13px;
                                line-height: 1.6;
                                color: #00ff88;
                                margin-bottom: 20px;
                                max-height: 200px;
                                overflow-y: auto;
                            }
                            .info {
                                font-family: 'Segoe UI', sans-serif;
                                color: #aaa;
                                font-size: 13px;
                                text-align: center;
                                margin-bottom: 16px;
                            }
                            .info strong { color: #00ff88; }
                            .btn-copy {
                                display: block;
                                width: 100%;
                                padding: 12px;
                                background: #00ff88;
                                color: #1a1a2e;
                                border: none;
                                border-radius: 8px;
                                font-size: 15px;
                                font-weight: 700;
                                cursor: pointer;
                                transition: background 0.3s;
                                font-family: 'Segoe UI', sans-serif;
                            }
                            .btn-copy:hover { background: #00cc6a; }
                            .btn-copy:active { transform: scale(0.98); }
                            .footer {
                                margin-top: 16px;
                                font-family: 'Segoe UI', sans-serif;
                                font-size: 12px;
                                color: #555;
                                text-align: center;
                            }
                        </style>
                    </head>
                    <body>
                        <div class="card">
                            <h2>✅ Token de Autorización</h2>
                            <div class="info">
                                Token válido por <strong>24 horas</strong> &nbsp;|&nbsp; Usuario: <strong>${data.user?.email || email}</strong> &nbsp;|&nbsp; Rol: <strong>${data.user?.role || 'admin'}</strong>
                            </div>
                            <div class="token-box" id="tokenDisplay">${data.token}</div>
                            <button class="btn-copy" onclick="copyToken()">📋 Copiar Token</button>
                            <p class="footer">Úsalo en Swagger: Authorize → pegar token → Authorize</p>
                        </div>
                        <script>
                            function copyToken() {
                                const token = document.getElementById('tokenDisplay').textContent;
                                navigator.clipboard.writeText(token).then(() => {
                                    const btn = document.querySelector('.btn-copy');
                                    btn.textContent = '✅ ¡Copiado!';
                                    setTimeout(() => { btn.textContent = '📋 Copiar Token'; }, 2000);
                                }).catch(() => {
                                    const range = document.createRange();
                                    range.selectNode(document.getElementById('tokenDisplay'));
                                    window.getSelection().removeAllRanges();
                                    window.getSelection().addRange(range);
                                    document.execCommand('copy');
                                    const btn = document.querySelector('.btn-copy');
                                    btn.textContent = '✅ ¡Copiado!';
                                    setTimeout(() => { btn.textContent = '📋 Copiar Token'; }, 2000);
                                });
                            }
                        <\/script>
                    </body>
                    </html>
                `);
                tokenWindow.document.close();

            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
